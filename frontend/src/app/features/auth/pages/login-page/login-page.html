<div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-2xl/9 font-bold tracking-tight">Sign in to your account</h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-[480px]">
    <div class="bg-white px-6 py-12 shadow-sm sm:rounded-lg sm:px-12">
      <form class="flex flex-col space-y-6" (submit)="onSubmit($event)">
        <div>
          <label for="email" class="block text-sm/6 font-medium">Email</label>

          <input
            id="email"
            type="email"
            autocomplete="email"
            class="block w-full rounded-md bg-white px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-orange-600 sm:text-sm/6"
            [formField]="loginForm.email" />

          <app-form-field-error [errors]="loginForm.email().errors()" />
        </div>

        <div>
          <label for="password" class="block text-sm/6 font-medium">Password</label>

          <input
            id="password"
            type="password"
            autocomplete="current-password"
            class="block w-full rounded-md bg-white px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-orange-600 sm:text-sm/6"
            [formField]="loginForm.password" />

          <app-form-field-error [errors]="loginForm.password().errors()" />
        </div>

        <button
          type="button"
          class="block self-end font-semibold text-sm/6 cursor-pointer hover:text-black hover:underline">
          Forgot password?
        </button>

        <button
          type="submit"
          [disabled]="loginForm().invalid()"
          class="flex justify-center rounded-md bg-orange-600 px-3 py-1.5 text-sm/6 font-semibold text-white shadow-xs hover:bg-orange-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-orange-600 cursor-pointer">
          Sign in
        </button>
      </form>

      <div class="space-y-6 mt-8">
        <div class="flex items-center gap-x-6">
          <div class="flex-1 border-t border-gray-200"></div>
          <p class="text-sm/6 font-medium text-nowrap text-gray-900">Or continue with</p>
          <div class="flex-1 border-t border-gray-200"></div>
        </div>

        <button
          type="button"
          class="flex w-full items-center justify-center gap-3 rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-xs inset-ring inset-ring-gray-300 hover:bg-gray-50 focus-visible:inset-ring-transparent cursor-pointer">
          <svg viewBox="0 0 24 24" aria-hidden="true" class="h-5 w-5">
            <path
              d="M12.0003 4.75C13.7703 4.75 15.3553 5.36002 16.6053 6.54998L20.0303 3.125C17.9502 1.19 15.2353 0 12.0003 0C7.31028 0 3.25527 2.69 1.28027 6.60998L5.27028 9.70498C6.21525 6.86002 8.87028 4.75 12.0003 4.75Z"
              fill="#EA4335" />
            <path
              d="M23.49 12.275C23.49 11.49 23.415 10.73 23.3 10H12V14.51H18.47C18.18 15.99 17.34 17.25 16.08 18.1L19.945 21.1C22.2 19.01 23.49 15.92 23.49 12.275Z"
              fill="#4285F4" />
            <path
              d="M5.26498 14.2949C5.02498 13.5699 4.88501 12.7999 4.88501 11.9999C4.88501 11.1999 5.01998 10.4299 5.26498 9.7049L1.275 6.60986C0.46 8.22986 0 10.0599 0 11.9999C0 13.9399 0.46 15.7699 1.28 17.3899L5.26498 14.2949Z"
              fill="#FBBC05" />
            <path
              d="M12.0004 24.0001C15.2404 24.0001 17.9654 22.935 19.9454 21.095L16.0804 18.095C15.0054 18.82 13.6204 19.245 12.0004 19.245C8.8704 19.245 6.21537 17.135 5.2654 14.29L1.27539 17.385C3.25539 21.31 7.3104 24.0001 12.0004 24.0001Z"
              fill="#34A853" />
          </svg>

          <span class="text-sm/6 font-semibold">Google</span>
        </button>
      </div>
    </div>

    <p class="mt-10 text-center text-sm/6 text-gray-500">
      Not a member?
      <a routerLink="/auth/register" class="font-semibold text-orange-600 hover:text-orange-500">
        Register now!
      </a>
    </p>
  </div>
</div>
